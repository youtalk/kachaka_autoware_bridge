/**:
  ros__parameters:
    seed: 12345
    max_duration_sec: 0.0          # 0 = no built-in cap (defer to SP4 / operator)
    # Carrot lead/refresh in METRES of arc length (shape-agnostic). Lead long
    # enough to cross a corner; refresh before arrival so the robot never stops
    # at the carrot. Tune on-robot per shape.
    carrot_lead_len: 1.2
    carrot_refresh_len: 0.5
    bringup_timeout_sec: 60.0
    loop_params_path: ""           # empty -> node default (~/maps/kachaka_loop/loop_params.yaml)
    session_dir: ""                # empty -> node default (~/endurance_runs)

name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
      options: --user root

    steps:
      - name: Install build prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ccache \
            git \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-vcstool \
            build-essential \
            cmake \
            protobuf-compiler-grpc \
            libgrpc++-dev \
            libprotobuf-dev

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}-
            ccache-${{ runner.os }}-

      - name: Generate kachaka-api proto sources
        shell: bash
        run: |
          set -exo pipefail
          out=kachaka-api/ros2/kachaka_grpc_ros2_bridge/gen-src
          mkdir -p "$out"
          protoc -I kachaka-api/protos \
            --grpc_out="$out" \
            --plugin=protoc-gen-grpc=/usr/bin/grpc_cpp_plugin \
            --cpp_out="$out" \
            kachaka-api/protos/*.proto
          ls -la "$out"

      - name: rosdep install
        shell: bash
        run: |
          set -exo pipefail
          rosdep update --rosdistro jazzy
          rosdep install --from-paths . --ignore-src --rosdistro jazzy -y \
            --skip-keys "autoware_core_api autoware_core_control autoware_core_localization autoware_core_map autoware_core_planning autoware_core_sensing autoware_default_adapi autoware_adapi_adaptors autoware_rviz_plugins"

      - name: colcon build
        shell: bash
        run: |
          set -exo pipefail
          source /opt/ros/jazzy/setup.bash
          export CC="ccache gcc"
          export CXX="ccache g++"
          colcon build \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --packages-skip-regex "^kachaka_autoware_bridge$|^kachaka_vision$|^kachaka_speak$|^kachaka_nav2_bringup$"

      - name: colcon test
        shell: bash
        run: |
          set -exo pipefail
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          # Only test our packages â€” kachaka-api submodule packages have upstream lint
          # quirks and use auto-generated code that trips ament_lint.
          colcon test --event-handlers console_direct+ \
            --packages-select-regex "^kachaka_autoware_(description|maps|vehicle_interface)$"
          colcon test-result --verbose
